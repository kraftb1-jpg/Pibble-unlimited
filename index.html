<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pibble Unlimited</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }
        .particle {
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes tailWag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(35deg); }
        }
        .wagging {
            animation: tailWag 0.15s infinite;
            transform-origin: 20% 80%;
        }
        @keyframes pant {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.03) scaleX(1.02); }
        }
        .panting {
            animation: pant 0.8s infinite ease-in-out;
            transform-origin: bottom center;
        }
        @keyframes squish {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .belly-squish:active {
            animation: squish 0.2s ease-in-out;
        }
        .galaxy-bg {
            background: linear-gradient(45deg, #312e81, #1e1b4b, #4c1d95, #312e81);
            background-size: 400% 400%;
            animation: gradient 5s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body id="app-container" class="min-h-screen font-sans flex flex-col items-center p-4 lg:p-8 overflow-hidden select-none transition-colors duration-1000 bg-amber-50 text-amber-950" data-light="bg-amber-50 text-amber-950" data-dark="bg-indigo-950 text-indigo-100">

    <!-- Header -->
    <header id="header-container" class="w-full max-w-4xl flex flex-col md:flex-row justify-between items-center p-6 rounded-3xl shadow-xl mb-8 z-10 border transition-colors duration-1000 bg-white border-amber-100 shadow-amber-200/50" data-light="bg-white border-amber-100 shadow-amber-200/50" data-dark="bg-indigo-900 border-indigo-700 shadow-cyan-900/50">
        <div class="text-center md:text-left mb-4 md:mb-0">
            <h1 id="header-title" class="text-4xl font-extrabold tracking-tight flex items-center gap-3 justify-center md:justify-start text-amber-800" data-light="text-amber-800" data-dark="text-cyan-100">
                <span id="header-icon-container">
                    <!-- Icon injected here -->
                </span>
                <span id="header-text">Pibble Unlimited</span>
            </h1>
            <p id="scrubs-text" class="font-medium mt-1 text-amber-600" data-light="text-amber-600" data-dark="text-indigo-300">Total Scrubs: 0</p>
        </div>
        
        <div id="points-box" class="px-8 py-4 rounded-2xl border-2 transition-colors duration-1000 bg-amber-100 border-amber-200" data-light="bg-amber-100 border-amber-200" data-dark="bg-indigo-950 border-indigo-500">
            <p id="points-label" class="text-sm font-bold uppercase tracking-wider mb-1 text-center text-amber-700" data-light="text-amber-700" data-dark="text-cyan-400">Pibble Points</p>
            <p id="points-display" class="text-4xl lg:text-5xl font-black text-center drop-shadow-sm text-amber-600" data-light="text-amber-600" data-dark="text-cyan-200">0</p>
        </div>
    </header>

    <div class="w-full max-w-4xl flex flex-col lg:flex-row gap-8 items-start">
        
        <!-- Game Area (Left Side) -->
        <div id="game-panel" class="flex-1 w-full rounded-3xl p-8 shadow-xl flex flex-col items-center justify-center min-h-[500px] relative overflow-visible transition-colors duration-1000 bg-white border-amber-100 shadow-amber-200/50 border" data-light="bg-white border-amber-100 shadow-amber-200/50 border" data-dark="bg-indigo-900 border-indigo-700 shadow-cyan-900/50 border">
            
            <h2 id="game-title" class="text-2xl font-bold mb-6 text-center text-amber-700" data-light="text-amber-700" data-dark="text-cyan-200">
                Scrub Pibble's Belly!
            </h2>

            <!-- Pibble the Pug SVG -->
            <div id="pug-wrapper" class="relative w-64 h-80 sm:w-80 sm:h-96">
                <svg id="pug-svg" viewBox="0 0 200 240" class="w-full h-full drop-shadow-2xl transition-all duration-1000" style="filter: drop-shadow(0px 10px 15px rgba(217, 119, 6, 0.2))">
                    <defs>
                        <linearGradient id="galaxyPugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4c1d95" />
                            <stop offset="50%" stop-color="#312e81" />
                            <stop offset="100%" stop-color="#1e1b4b" />
                        </linearGradient>
                        <radialGradient id="galaxyBellyGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#a78bfa" />
                            <stop offset="100%" stop-color="#4c1d95" />
                        </radialGradient>
                    </defs>
                    <g>
                        <!-- Tail -->
                        <path id="pug-tail" d="M140,160 C180,140 170,100 150,110 C130,120 140,150 150,140" fill="none" stroke="#C19A6B" stroke-width="12" stroke-linecap="round" class="transition-colors duration-1000" data-light-stroke="#C19A6B" data-dark-stroke="url(#galaxyPugGrad)" />
                        
                        <!-- Back Legs -->
                        <rect x="50" y="180" width="25" height="40" rx="12" fill="#A88151" class="svg-theme transition-colors duration-1000" data-light-fill="#A88151" data-dark-fill="#1e1b4b" />
                        <rect x="125" y="180" width="25" height="40" rx="12" fill="#A88151" class="svg-theme transition-colors duration-1000" data-light-fill="#A88151" data-dark-fill="#1e1b4b" />

                        <!-- Body -->
                        <ellipse cx="100" cy="150" rx="65" ry="75" fill="#C19A6B" class="svg-theme transition-colors duration-1000" data-light-fill="#C19A6B" data-dark-fill="url(#galaxyPugGrad)" />

                        <!-- BELLY (The interactive zone) -->
                        <g id="belly-group" class="cursor-pointer belly-squish touch-none" style="touch-action: none;">
                            <ellipse cx="100" cy="165" rx="45" ry="50" fill="#F4C2C2" stroke="#E5A9A9" stroke-width="3" class="svg-theme transition-colors duration-1000" data-light-fill="#F4C2C2" data-dark-fill="url(#galaxyBellyGrad)" data-light-stroke="#E5A9A9" data-dark-stroke="#8b5cf6" />
                            <!-- Belly button/details -->
                            <circle cx="100" cy="180" r="3" fill="#E5A9A9" class="svg-theme transition-colors duration-1000" data-light-fill="#E5A9A9" data-dark-fill="#8b5cf6" />
                            <path d="M 80,150 Q 100,160 120,150" fill="none" stroke="#E5A9A9" stroke-width="2" stroke-linecap="round" opacity="0.5" class="svg-theme transition-colors duration-1000" data-light-stroke="#E5A9A9" data-dark-stroke="#8b5cf6" />
                            <path d="M 85,165 Q 100,175 115,165" fill="none" stroke="#E5A9A9" stroke-width="2" stroke-linecap="round" opacity="0.5" class="svg-theme transition-colors duration-1000" data-light-stroke="#E5A9A9" data-dark-stroke="#8b5cf6" />
                            
                            <!-- Invisible larger hit area -->
                            <ellipse cx="100" cy="165" rx="60" ry="65" fill="transparent" />
                        </g>

                        <!-- Front Legs -->
                        <rect x="65" y="195" width="22" height="35" rx="11" fill="#C19A6B" class="svg-theme transition-colors duration-1000" data-light-fill="#C19A6B" data-dark-fill="url(#galaxyPugGrad)" />
                        <rect x="113" y="195" width="22" height="35" rx="11" fill="#C19A6B" class="svg-theme transition-colors duration-1000" data-light-fill="#C19A6B" data-dark-fill="url(#galaxyPugGrad)" />
                        <!-- Paws -->
                        <ellipse cx="76" cy="225" rx="14" ry="8" fill="#F3E5AB" class="svg-theme transition-colors duration-1000" data-light-fill="#F3E5AB" data-dark-fill="#c4b5fd" />
                        <ellipse cx="124" cy="225" rx="14" ry="8" fill="#F3E5AB" class="svg-theme transition-colors duration-1000" data-light-fill="#F3E5AB" data-dark-fill="#c4b5fd" />

                        <!-- Head -->
                        <circle cx="100" cy="80" r="55" fill="#C19A6B" class="svg-theme transition-colors duration-1000" data-light-fill="#C19A6B" data-dark-fill="url(#galaxyPugGrad)" />
                        
                        <!-- Forehead wrinkles -->
                        <path d="M 80,45 Q 100,55 120,45" fill="none" stroke="#A88151" stroke-width="3" stroke-linecap="round" class="svg-theme transition-colors duration-1000" data-light-stroke="#A88151" data-dark-stroke="#1e1b4b" />
                        <path d="M 70,55 Q 100,65 130,55" fill="none" stroke="#A88151" stroke-width="3" stroke-linecap="round" class="svg-theme transition-colors duration-1000" data-light-stroke="#A88151" data-dark-stroke="#1e1b4b" />

                        <!-- Ears -->
                        <path d="M 45,60 C 20,40 10,80 30,100 C 40,110 50,90 50,80 Z" fill="#2B2B2B" />
                        <path d="M 155,60 C 180,40 190,80 170,100 C 160,110 150,90 150,80 Z" fill="#2B2B2B" />

                        <!-- Mask / Muzzle -->
                        <ellipse cx="100" cy="100" rx="35" ry="25" fill="#2B2B2B" />
                        
                        <!-- Nose -->
                        <ellipse cx="100" cy="92" rx="8" ry="5" fill="#000" />
                        <path d="M 98,90 Q 100,92 102,90" fill="none" stroke="#444" stroke-width="1" />

                        <!-- NORMAL FACE (hidden when scrubbing) -->
                        <g id="face-normal">
                            <!-- Open Mouth -->
                            <path d="M 90,105 Q 100,115 110,105" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
                            <!-- Open Eyes -->
                            <circle cx="70" cy="80" r="12" fill="#2B2B2B" />
                            <circle cx="130" cy="80" r="12" fill="#2B2B2B" />
                            <circle cx="73" cy="77" r="4" fill="#FFF" />
                            <circle cx="127" cy="77" r="4" fill="#FFF" />
                        </g>

                        <!-- SCRUBBING FACE (visible when scrubbing) -->
                        <g id="face-scrubbing" style="display: none;">
                            <!-- Open Happy Mouth & Tongue -->
                            <path d="M 85,105 Q 100,120 115,105" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
                            <path d="M 92,112 C 92,130 108,130 108,112 Z" fill="#FF7F7F" />
                            <path d="M 100,112 L 100,125" fill="none" stroke="#CC4444" stroke-width="1.5" />
                            <!-- Closed Happy Eyes -->
                            <path d="M 60,85 Q 70,75 80,85" fill="none" stroke="#2B2B2B" stroke-width="4" stroke-linecap="round" />
                            <path d="M 120,85 Q 130,75 140,85" fill="none" stroke="#2B2B2B" stroke-width="4" stroke-linecap="round" />
                        </g>
                    </g>
                </svg>
            </div>

            <div id="active-scrubber-display" class="mt-8 flex items-center justify-center gap-3 font-semibold px-6 py-3 rounded-full border transition-colors duration-1000 bg-amber-50 border-amber-100 text-amber-500" data-light="bg-amber-50 border-amber-100 text-amber-500" data-dark="bg-indigo-950 border-indigo-700 text-cyan-300">
                <!-- Injected via JS -->
            </div>

            <div id="tip-text" class="text-sm mt-4 text-center text-amber-400" data-light="text-amber-400" data-dark="text-indigo-400">
                Tip: You can click and drag across the belly to scrub faster!
            </div>

        </div>

        <!-- Shop Area (Right Side) -->
        <div id="shop-panel" class="w-full lg:w-96 rounded-3xl p-6 md:p-8 shadow-xl flex-shrink-0 transition-colors duration-1000 bg-white border-amber-100 shadow-amber-200/50 border" data-light="bg-white border-amber-100 shadow-amber-200/50 border" data-dark="bg-indigo-900 border-indigo-700 shadow-cyan-900/50 border">
            <h2 id="shop-title" class="text-2xl font-bold mb-6 flex items-center gap-2 text-amber-800" data-light="text-amber-800" data-dark="text-cyan-100">
                Scrubber Shop
            </h2>
            
            <!-- Cosmic Ascension Banner -->
            <div id="ascension-banner" class="mb-6 p-5 rounded-2xl bg-indigo-900 text-white shadow-lg border border-indigo-500 relative overflow-hidden group">
                <div class="absolute inset-0 galaxy-bg opacity-40 group-hover:opacity-60 transition-opacity"></div>
                <div class="relative z-10 flex flex-col items-center text-center">
                    <div id="ascension-icon" class="mb-2 animate-pulse text-cyan-400 w-8 h-8"></div>
                    <h3 class="font-bold text-lg text-cyan-200 mb-1">Cosmic Ascension</h3>
                    <p class="text-sm text-indigo-200 mb-4 leading-tight">Unlock the Galaxy Pug! Multiplies the cost and power of all scrubbers by 2x!</p>
                    <button id="btn-ascend" class="px-5 py-2.5 rounded-full font-bold text-sm tracking-wide transition-all bg-indigo-950/80 text-indigo-400 border border-indigo-800 cursor-not-allowed" disabled>
                        Requires 500,000 pts
                    </button>
                </div>
            </div>

            <div id="shop-items" class="space-y-4">
                <!-- Shop items injected via JS -->
            </div>
        </div>

    </div>

    <!-- JS Logic -->
    <script>
        // Icons as SVG strings (replacing Lucide React components)
        const ICONS = {
            hand: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-4 0v4M14 11V4a2 2 0 0 0-4 0v6M10 11V3a2 2 0 0 0-4 0v7M6 11v-1a2 2 0 0 0-4 0v6c0 4.418 3.582 8 8 8h1.22c2.122 0 4.156-.844 5.656-2.344L22 17.5l-3.32-3.32A2 2 0 0 0 17.266 14H18z"/></svg>`,
            brush: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg>`,
            sparkles: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`,
            zap: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
            crown: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>`,
            star: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
            droplets: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.9 7 2.9s-2.15 4.96-3.29 6.16C2.57 10.01 2 11.11 2 12.25 2 14.47 3.8 16.3 6 16.3Z"/><path d="M22 17.3c0-2.22-1.8-4.05-4-4.05s-4 1.83-4 4.05c0 1.16.57 2.26 1.71 3.19s2.29 6.16 2.29 6.16 2.15-4.96 3.29-6.16C21.43 19.56 22 18.46 22 17.3Z"/></svg>`,
            heartFilled: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`,
            starFilled: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
        };

        const SCRUBBERS_DATA = [
            { id: 'hand', name: 'Bare Hand', cost: 0, power: 1, iconKey: 'hand', color: 'text-orange-200', bg: 'bg-orange-500' },
            { id: 'brush', name: 'Soft Brush', cost: 50, power: 5, iconKey: 'brush', color: 'text-blue-200', bg: 'bg-blue-500' },
            { id: 'sponge', name: 'Bath Sponge', cost: 300, power: 25, iconKey: 'sparkles', color: 'text-pink-200', bg: 'bg-pink-500' },
            { id: 'electric', name: 'Electric Massager', cost: 2000, power: 100, iconKey: 'zap', color: 'text-purple-200', bg: 'bg-purple-500' },
            { id: 'golden', name: 'Golden Scrubber', cost: 15000, power: 500, iconKey: 'crown', color: 'text-yellow-200', bg: 'bg-yellow-500' },
            { id: 'galaxy', name: 'Galaxy Scrubber', cost: 40000, power: 5000, iconKey: 'star', color: 'text-cyan-200', bg: 'bg-indigo-900' },
            { id: 'hose', name: 'Garden Hose', cost: 1000000, power: 100000, iconKey: 'droplets', color: 'text-blue-100', bg: 'bg-blue-600' }
        ];

        // State
        let points = 0;
        let inventory = ['hand'];
        let activeScrubberId = 'hand';
        let totalScrubs = 0;
        let isGalaxyPug = false;
        
        let isScrubbing = false;
        let isPointerDown = false;
        let lastPosX = 0;
        let lastPosY = 0;
        let scrubbingTimeoutId = null;

        // DOM Elements
        const DOM = {
            pointsDisplay: document.getElementById('points-display'),
            scrubsText: document.getElementById('scrubs-text'),
            shopItems: document.getElementById('shop-items'),
            activeScrubberDisplay: document.getElementById('active-scrubber-display'),
            bellyGroup: document.getElementById('belly-group'),
            gameTitle: document.getElementById('game-title'),
            pugTail: document.getElementById('pug-tail'),
            pugWrapper: document.getElementById('pug-wrapper'),
            faceNormal: document.getElementById('face-normal'),
            faceScrubbing: document.getElementById('face-scrubbing'),
            ascensionBanner: document.getElementById('ascension-banner'),
            btnAscend: document.getElementById('btn-ascend'),
            headerIconContainer: document.getElementById('header-icon-container'),
            ascensionIcon: document.getElementById('ascension-icon'),
            headerText: document.getElementById('header-text'),
            pugSvg: document.getElementById('pug-svg')
        };

        // Initialize Static Icons
        DOM.ascensionIcon.innerHTML = ICONS.star;

        function getCurrentScrubbers() {
            return SCRUBBERS_DATA.map(s => ({
                ...s,
                cost: isGalaxyPug ? s.cost * 2 : s.cost,
                power: isGalaxyPug ? s.power * 2 : s.power
            }));
        }

        function getActiveScrubber() {
            return getCurrentScrubbers().find(s => s.id === activeScrubberId);
        }

        function updateUI() {
            DOM.pointsDisplay.textContent = points.toLocaleString();
            DOM.scrubsText.textContent = `Total Scrubs: ${totalScrubs.toLocaleString()}`;
            
            // Ascension Button
            if (points >= 500000) {
                DOM.btnAscend.className = "px-5 py-2.5 rounded-full font-bold text-sm tracking-wide transition-all bg-cyan-500 hover:bg-cyan-400 text-indigo-950 shadow-[0_0_15px_rgba(34,211,238,0.6)] hover:shadow-[0_0_25px_rgba(34,211,238,0.8)] scale-105";
                DOM.btnAscend.textContent = "Ascend (500,000 pts)";
                DOM.btnAscend.disabled = false;
            } else {
                DOM.btnAscend.className = "px-5 py-2.5 rounded-full font-bold text-sm tracking-wide transition-all bg-indigo-950/80 text-indigo-400 border border-indigo-800 cursor-not-allowed";
                DOM.btnAscend.textContent = "Requires 500,000 pts";
                DOM.btnAscend.disabled = true;
            }

            renderShop();
            renderActiveScrubber();
        }

        function renderActiveScrubber() {
            const active = getActiveScrubber();
            DOM.activeScrubberDisplay.innerHTML = `
                <div class="p-1.5 rounded-lg w-7 h-7 ${active.bg} ${active.color}">
                    ${ICONS[active.iconKey]}
                </div>
                Equipped: ${active.name} (+${active.power.toLocaleString()} pts)
            `;
        }

        function renderShop() {
            const scrubbers = getCurrentScrubbers();
            let html = '';

            scrubbers.forEach(item => {
                const isOwned = inventory.includes(item.id);
                const isEquipped = activeScrubberId === item.id;
                const canAfford = points >= item.cost;
                const isGalaxy = item.id === 'galaxy';

                // Determine container classes based on state
                let containerClass = "relative overflow-hidden rounded-2xl border-2 transition-all duration-200 ";
                if (isEquipped) {
                    containerClass += isGalaxy ? 'border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.5)] scale-[1.02] galaxy-bg text-white' : 'border-pink-500 bg-pink-50 shadow-md scale-[1.02]';
                } else if (isOwned) {
                    containerClass += isGalaxyPug ? 'border-indigo-600 bg-indigo-800/50 hover:border-indigo-400' : 'border-amber-200 bg-white hover:border-amber-300';
                } else if (canAfford) {
                    containerClass += isGalaxyPug ? 'border-green-500/50 bg-green-900/20 hover:bg-green-900/40 cursor-pointer' : 'border-green-200 bg-green-50/50 hover:bg-green-50 hover:shadow-md cursor-pointer';
                } else {
                    containerClass += isGalaxyPug ? 'border-indigo-950 bg-indigo-950/50 opacity-60' : 'border-gray-100 bg-gray-50 opacity-80';
                }

                // Title Class
                let titleClass = "font-bold text-lg leading-tight ";
                if (isEquipped && isGalaxy) titleClass += "text-white drop-shadow-md";
                else if (isGalaxyPug) titleClass += "text-indigo-100";
                else titleClass += "text-amber-900";

                // Subtitle Class
                let subClass = "text-sm font-medium ";
                if (isEquipped && isGalaxy) subClass += "text-cyan-200";
                else if (isGalaxyPug) subClass += "text-indigo-300";
                else subClass += "text-amber-600";

                // Right Side Button/Status
                let rightSide = '';
                if (isEquipped) {
                    let badgeClass = isGalaxy ? 'bg-cyan-500 text-white' : 'bg-pink-500 text-white';
                    rightSide = `<span class="${badgeClass} text-xs font-black uppercase tracking-wider px-3 py-1.5 rounded-full shadow-sm">Equipped</span>`;
                } else if (isOwned) {
                    let btnClass = isGalaxyPug ? 'bg-indigo-800 text-indigo-200 hover:bg-indigo-700' : 'bg-amber-100 text-amber-700 hover:bg-amber-200';
                    rightSide = `<button class="text-xs font-bold uppercase tracking-wider px-3 py-1.5 rounded-full transition-colors ${btnClass}">Equip</button>`;
                } else {
                    let costClass = canAfford ? (isGalaxyPug ? 'text-green-400' : 'text-green-600') : (isGalaxyPug ? 'text-indigo-400' : 'text-gray-400');
                    let btnClass = canAfford ? 'bg-green-500 hover:bg-green-600 text-white shadow-sm' : (isGalaxyPug ? 'bg-indigo-950 text-indigo-700 cursor-not-allowed' : 'bg-gray-200 text-gray-400 cursor-not-allowed');
                    rightSide = `
                        <div class="flex flex-col items-end">
                            <span class="text-sm font-bold ${costClass}">${item.cost.toLocaleString()} pts</span>
                            <button class="mt-1 text-xs font-bold uppercase tracking-wider px-3 py-1.5 rounded-full transition-colors ${btnClass}" ${!canAfford ? 'disabled' : ''}>Buy</button>
                        </div>
                    `;
                }

                html += `
                    <div class="${containerClass}" onclick="handleShopClick('${item.id}')">
                        <div class="p-4 flex items-center gap-4">
                            <div class="p-3 rounded-xl flex-shrink-0 w-12 h-12 ${item.bg} ${item.color} shadow-inner">
                                <div class="w-full h-full ${isGalaxy && isEquipped ? 'animate-spin-slow' : ''}">
                                    ${ICONS[item.iconKey]}
                                </div>
                            </div>
                            <div class="flex-1">
                                <h3 class="${titleClass}">${item.name}</h3>
                                <p class="${subClass}">+${item.power.toLocaleString()} pts / scrub</p>
                            </div>
                            <div class="flex-shrink-0 text-right">
                                ${rightSide}
                            </div>
                        </div>
                    </div>
                `;
            });

            DOM.shopItems.innerHTML = html;
        }

        // Exposed globally so inline onclick can reach it
        window.handleShopClick = function(id) {
            const scrubbers = getCurrentScrubbers();
            const item = scrubbers.find(s => s.id === id);
            if (!item) return;

            const isOwned = inventory.includes(item.id);
            const canAfford = points >= item.cost;

            if (isOwned) {
                activeScrubberId = item.id;
                updateUI();
            } else if (canAfford) {
                points -= item.cost;
                inventory.push(item.id);
                activeScrubberId = item.id;
                updateUI();
            }
        };

        DOM.btnAscend.addEventListener('click', () => {
            if (points >= 500000 && !isGalaxyPug) {
                points -= 500000;
                isGalaxyPug = true;
                DOM.ascensionBanner.style.display = 'none';
                applyTheme();
                updateUI();
            }
        });

        function spawnParticle(x, y, amount) {
            const p = document.createElement('div');
            const isGalaxy = activeScrubberId === 'galaxy';
            const colorClass = isGalaxy ? 'text-cyan-400' : 'text-pink-500';
            const iconHtml = isGalaxy ? `<div class="w-5 h-5 text-cyan-400">${ICONS.starFilled}</div>` : `<div class="w-5 h-5 text-pink-500">${ICONS.heartFilled}</div>`;
            
            p.className = `particle fixed pointer-events-none text-2xl font-black drop-shadow-md z-50 flex items-center gap-1 ${colorClass}`;
            
            const scatterX = x + (Math.random() - 0.5) * 40;
            const scatterY = y + (Math.random() - 0.5) * 40;
            
            p.style.left = (scatterX - 20) + 'px';
            p.style.top = (scatterY - 20) + 'px';
            p.innerHTML = `+${amount} ${iconHtml}`;
            
            document.body.appendChild(p);
            
            setTimeout(() => {
                if(p.parentNode) p.parentNode.removeChild(p);
            }, 800);
        }

        function setScrubbingState(state) {
            isScrubbing = state;
            DOM.gameTitle.textContent = isScrubbing ? "Oh yeah, that's the spot!" : "Scrub Pibble's Belly!";
            
            if (isScrubbing) {
                DOM.pugTail.classList.add('wagging');
                DOM.pugWrapper.classList.add('panting');
                DOM.faceNormal.style.display = 'none';
                DOM.faceScrubbing.style.display = 'block';
            } else {
                DOM.pugTail.classList.remove('wagging');
                DOM.pugWrapper.classList.remove('panting');
                DOM.faceNormal.style.display = 'block';
                DOM.faceScrubbing.style.display = 'none';
            }
        }

        function triggerScrub(x, y) {
            const active = getActiveScrubber();
            points += active.power;
            totalScrubs += 1;
            spawnParticle(x, y, active.power);
            
            setScrubbingState(true);
            updateUI(); // Keep points UI fast
            
            if (scrubbingTimeoutId) clearTimeout(scrubbingTimeoutId);
            scrubbingTimeoutId = setTimeout(() => {
                setScrubbingState(false);
            }, 300);
        }

        // Pointer Event Handlers
        DOM.bellyGroup.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            isPointerDown = true;
            lastPosX = e.clientX;
            lastPosY = e.clientY;
            triggerScrub(e.clientX, e.clientY);
            DOM.bellyGroup.setPointerCapture(e.pointerId);
        });

        DOM.bellyGroup.addEventListener('pointermove', (e) => {
            if (!isPointerDown) return;
            const dist = Math.hypot(e.clientX - lastPosX, e.clientY - lastPosY);
            if (dist > 25) {
                triggerScrub(e.clientX, e.clientY);
                lastPosX = e.clientX;
                lastPosY = e.clientY;
            }
        });

        function endPointer(e) {
            isPointerDown = false;
            try { DOM.bellyGroup.releasePointerCapture(e.pointerId); } catch(err){}
        }

        DOM.bellyGroup.addEventListener('pointerup', endPointer);
        DOM.bellyGroup.addEventListener('pointerleave', endPointer);

        // Theming Function: Uses data-light and data-dark attributes to switch classes
        function applyTheme() {
            // Update Title Text/Icon
            DOM.headerText.textContent = isGalaxyPug ? 'Galaxy Pibble Unlimited' : 'Pibble Unlimited';
            DOM.headerIconContainer.innerHTML = `<div class="${isGalaxyPug ? 'text-cyan-400 animate-pulse w-8 h-8' : 'text-pink-500 animate-pulse w-8 h-8'}">${isGalaxyPug ? ICONS.starFilled : ICONS.heartFilled}</div>`;
            DOM.pugSvg.style.filter = isGalaxyPug ? "drop-shadow(0px 10px 25px rgba(34, 211, 238, 0.4))" : "drop-shadow(0px 10px 15px rgba(217, 119, 6, 0.2))";

            // Standard DOM elements classes switch
            document.querySelectorAll('[data-light]').forEach(el => {
                const lightClasses = el.getAttribute('data-light').split(' ').filter(Boolean);
                const darkClasses = el.getAttribute('data-dark').split(' ').filter(Boolean);
                
                if (isGalaxyPug) {
                    el.classList.remove(...lightClasses);
                    el.classList.add(...darkClasses);
                } else {
                    el.classList.remove(...darkClasses);
                    el.classList.add(...lightClasses);
                }
            });

            // SVG elements Fill switch
            document.querySelectorAll('[data-light-fill]').forEach(el => {
                el.setAttribute('fill', isGalaxyPug ? el.getAttribute('data-dark-fill') : el.getAttribute('data-light-fill'));
            });

            // SVG elements Stroke switch
            document.querySelectorAll('[data-light-stroke]').forEach(el => {
                el.setAttribute('stroke', isGalaxyPug ? el.getAttribute('data-dark-stroke') : el.getAttribute('data-light-stroke'));
            });
        }

        // Initial setup
        applyTheme();
        updateUI();

    </script>
</body>
</html>
